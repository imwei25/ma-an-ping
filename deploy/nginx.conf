# 登录 + 按用户路由。每个用户走自己的 /用户名/ 路径 → 自己的容器。
# SSE（流式输出）关键：proxy_buffering off + 长 read_timeout。

server {
    listen 80;
    client_max_body_size 100m;      # 允许上传较大数据文件

    # 流式输出必需
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_set_header Host $host;

    location = / { return 302 /alice/; }   # 可选：默认跳转

    location /alice/ {
        auth_basic "alice";
        auth_basic_user_file /etc/nginx/.htpasswd;   # 如需按用户严格隔离，可为每个 location 用不同的 htpasswd 文件
        proxy_pass http://agent-alice:3000/;         # 末尾斜杠会剥掉 /alice/ 前缀
    }

    location /bob/ {
        auth_basic "bob";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://agent-bob:3000/;
    }
}
