# 多用户部署：每个用户一个独立容器（隔离），前面用 nginx 做登录+路由。
# 加用户 = 复制一个 agent-xxx 服务块 + 一对 volume + nginx 里加一个 location。
#
# 用法：
#   cp .env.example .env   # 填 DEEPSEEK_API_KEY
#   docker compose build
#   docker compose up -d
#   访问 http://服务器IP:8080/alice/   （账号密码见 htpasswd）

services:
  agent-alice:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sci-agent:latest          # 首个服务构建镜像，其余复用
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OC_MODEL: ${OC_MODEL:-deepseek/deepseek-v4-pro}
    volumes:
      - alice-uploads:/app/uploads
      - alice-outputs:/app/outputs
    expose: ["3000"]
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.5

  agent-bob:
    image: sci-agent:latest          # 复用上面构建的镜像
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OC_MODEL: ${OC_MODEL:-deepseek/deepseek-v4-pro}
    volumes:
      - bob-uploads:/app/uploads
      - bob-outputs:/app/outputs
    expose: ["3000"]
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.5

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./htpasswd:/etc/nginx/.htpasswd:ro
    depends_on: [agent-alice, agent-bob]
    restart: unless-stopped

volumes:
  alice-uploads: {}
  alice-outputs: {}
  bob-uploads: {}
  bob-outputs: {}
